<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyStore - Admin Panel</title>
  <style>
    :root {
      --primary: #4285f4;
      --success: #34a853;
      --danger: #ea4335;
      --text: #202124;
      --text-light: #5f6368;
      --bg: #f8f9fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: var(--primary);
    }
    .admin-form {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text-light);
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #dadce0;
      border-radius: 12px;
      font-size: 15px;
    }
    .file-input {
      padding: 12px;
      border: 2px dashed #dadce0;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      background: #f8f9fa;
    }
    .preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }
    .preview-item {
      position: relative;
      display: inline-block;
    }
    .preview {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .remove-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 500;
      cursor: pointer;
      font-size: 15px;
      margin-right: 10px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: #fbbc05; color: #202124; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
    }
    th {
      background: #f8f9fa;
      font-weight: 500;
      color: var(--text-light);
    }
    td { border-top: 1px solid #eee; }
    .action-btn {
      padding: 6px 12px;
      margin-right: 6px;
      border-radius: 8px;
      font-size: 13px;
    }
    .status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-approved { background: #e6f4ea; color: #137333; }
    .status-pending { background: #fef3c7; color: #b45309; }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 12px;
    }
    .form-title {
      margin-bottom: 20px;
      font-size: 22px;
      color: var(--text);
    }
    footer {
      background: #202124;
      color: #9aa0a6;
      text-align: center;
      padding: 20px;
      font-size: 13px;
      margin-top: 40px;
    }
    footer a { color: #8ab4f8; text-decoration: none; }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="back-btn">← Back to Store</a>
    <h1>Admin Panel - Manage Store</h1>
    
    <div class="admin-form">
      <h3 class="form-title" id="formTitle">Add New App</h3>
      
      <div class="form-grid">
        <div class="form-group"><label>Title *</label><input type="text" id="adminTitle" placeholder="App or Game Title"></div>
        <div class="form-group"><label>Category</label>
          <select id="adminCategory">
            <option value="Games">Games</option>
            <option value="Apps">Apps</option>
            <option value="Jerseys">Jerseys</option>
          </select>
        </div>
        <div class="form-group">
          <label>App Icon</label>
          <input type="file" id="iconUpload" accept="image/*" class="file-input" onchange="previewIcon(this)">
          <div id="iconPreview" class="preview-container"></div>
        </div>
        <div class="form-group">
          <label>Screenshots (multiple)</label>
          <input type="file" id="screenshotUpload" accept="image/*" multiple class="file-input" onchange="previewScreenshots(this)">
          <div id="screenshotPreview" class="preview-container"></div>
        </div>
        <div class="form-group"><label>Package Name</label><input type="text" id="adminPackage" placeholder="com.company.appname"></div>
        <div class="form-group"><label>Version</label><input type="text" id="adminVersion" placeholder="2.4.1"></div>
        <div class="form-group"><label>Build Number</label><input type="text" id="adminBuild" placeholder="241003"></div>
        <div class="form-group"><label>Developer</label><input type="text" id="adminDev" placeholder="Developer Name"></div>
        <div class="form-group"><label>Contact Email</label><input type="text" id="adminContact" placeholder="dev@example.com"></div>
      </div>

      <div class="form-group">
        <label>Direct Download APK URL</label>
        <input type="url" id="adminDownloadLink" placeholder="https://example.com/myapp.apk" style="font-family:monospace;">
        <small style="color:#666;">Paste direct .apk link</small>
      </div>

      <div class="form-group"><label>Description</label><textarea id="adminDesc" rows="3" placeholder="Short description..."></textarea></div>

      <button class="btn btn-primary" id="saveBtn" onclick="saveApp()">Save as Pending</button>
      <button class="btn" onclick="clearAdminForm()">Clear Form</button>
    </div>

    <h3>All Apps (Pending & Approved)</h3>
    <table id="adminTable">
      <thead>
        <tr>
          <th>Icon</th>
          <th>Title</th>
          <th>Category</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminTableBody"></tbody>
    </table>
  </div>

  <footer>
    <div>Contact: <a href="mailto:dreammods145@gmail.com">dreammods145@gmail.com</a></div>
    <div>Copyright © 2026-2027 MyStore. All Rights Reserved.</div>
    <div>Web made by <strong>dream X YASH Mods</strong></div>
  </footer>

  <script>
    let apps = JSON.parse(localStorage.getItem('storeApps')) || [];
    let iconBase64 = '';
    let screenshotBase64s = [];
    let editingId = null;   // null = adding new, number = editing

    function saveToStorage() {
      localStorage.setItem('storeApps', JSON.stringify(apps));
    }

    // Preview Icon
    function previewIcon(input) {
      const preview = document.getElementById('iconPreview');
      preview.innerHTML = '';
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          iconBase64 = e.target.result;
          const img = document.createElement('img');
          img.src = iconBase64;
          img.className = 'preview';
          preview.appendChild(img);
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // Preview Screenshots
    function previewScreenshots(input) {
      const previewContainer = document.getElementById('screenshotPreview');
      Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const base64 = e.target.result;
          screenshotBase64s.push(base64);

          const item = document.createElement('div');
          item.className = 'preview-item';
          item.innerHTML = `
            <img src="${base64}" class="preview">
            <button class="remove-btn" onclick="removeScreenshot(this, '${base64}')">×</button>
          `;
          previewContainer.appendChild(item);
        };
        reader.readAsDataURL(file);
      });
    }

    function removeScreenshot(btn, base64) {
      screenshotBase64s = screenshotBase64s.filter(b => b !== base64);
      btn.parentElement.remove();
    }

    function saveApp() {
      const title = document.getElementById('adminTitle').value.trim();
      if (!title) return alert("Title is required!");

      const appData = {
        title: title,
        category: document.getElementById('adminCategory').value,
        icon: iconBase64 || "https://picsum.photos/id/237/512/512",
        screenshots: [...screenshotBase64s],
        packageName: document.getElementById('adminPackage').value || "com.example.app",
        version: document.getElementById('adminVersion').value || "1.0.0",
        buildNumber: document.getElementById('adminBuild').value || "100000",
        dev: document.getElementById('adminDev').value || "Unknown",
        contact: document.getElementById('adminContact').value || "contact@example.com",
        desc: document.getElementById('adminDesc').value || "",
        downloadLink: document.getElementById('adminDownloadLink').value.trim() || "#",
      };

      if (editingId !== null) {
        // Update existing app
        const app = apps.find(a => a.id === editingId);
        if (app) {
          Object.assign(app, appData);
          // Keep original status
          alert("App updated successfully!");
        }
      } else {
        // Add new app
        appData.id = Date.now();
        appData.status = "pending";
        apps.push(appData);
        alert("New app added as Pending. Approve it to make it visible in the Store.");
      }

      saveToStorage();
      clearAdminForm();
      loadAdminTable();
    }

    function loadAdminTable() {
      const tbody = document.getElementById('adminTableBody');
      tbody.innerHTML = '';
      apps.forEach((app, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><img src="${app.icon}" width="48" height="48" style="border-radius:8px;" onerror="this.src='https://picsum.photos/id/237/512/512'"></td>
          <td>${app.title}</td>
          <td>${app.category}</td>
          <td>
            <span class="status ${app.status === 'approved' ? 'status-approved' : 'status-pending'}">
              ${app.status === 'approved' ? 'Approved' : 'Pending'}
            </span>
          </td>
          <td>
            <button class="btn btn-warning action-btn" onclick="editApp(${index})">Edit</button>
            ${app.status !== 'approved' ? 
              `<button class="btn btn-success action-btn" onclick="approveApp(${index})">Approve</button>` : ''}
            <button class="btn btn-danger action-btn" onclick="deleteApp(${index})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function editApp(index) {
      const app = apps[index];
      if (!app) return;

      editingId = app.id;

      // Fill form
      document.getElementById('formTitle').textContent = "Edit App";
      document.getElementById('saveBtn').textContent = "Update App";

      document.getElementById('adminTitle').value = app.title;
      document.getElementById('adminCategory').value = app.category;
      document.getElementById('adminPackage').value = app.packageName || "";
      document.getElementById('adminVersion').value = app.version || "";
      document.getElementById('adminBuild').value = app.buildNumber || "";
      document.getElementById('adminDev').value = app.dev || "";
      document.getElementById('adminContact').value = app.contact || "";
      document.getElementById('adminDesc').value = app.desc || "";
      document.getElementById('adminDownloadLink').value = app.downloadLink && app.downloadLink !== "#" ? app.downloadLink : "";

      // Icon preview
      iconBase64 = app.icon;
      const iconPreview = document.getElementById('iconPreview');
      iconPreview.innerHTML = `<img src="${app.icon}" class="preview">`;

      // Screenshots preview
      screenshotBase64s = [...(app.screenshots || [])];
      const ssPreview = document.getElementById('screenshotPreview');
      ssPreview.innerHTML = '';
      screenshotBase64s.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'preview-item';
        item.innerHTML = `
          <img src="${src}" class="preview">
          <button class="remove-btn" onclick="removeScreenshot(this, '${src}')">×</button>
        `;
        ssPreview.appendChild(item);
      });

      // Scroll to form
      document.querySelector('.admin-form').scrollIntoView({ behavior: "smooth" });
    }

    function approveApp(index) {
      if (confirm("Approve this app? It will now appear in the main store.")) {
        apps[index].status = "approved";
        saveToStorage();
        loadAdminTable();
      }
    }

    function deleteApp(index) {
      if (confirm("Delete this app permanently?")) {
        apps.splice(index, 1);
        saveToStorage();
        loadAdminTable();
        if (editingId === apps[index]?.id) clearAdminForm(); // if editing deleted item
      }
    }

    function clearAdminForm() {
      editingId = null;
      iconBase64 = '';
      screenshotBase64s = [];

      document.getElementById('formTitle').textContent = "Add New App";
      document.getElementById('saveBtn').textContent = "Save as Pending";

      document.getElementById('iconPreview').innerHTML = '';
      document.getElementById('screenshotPreview').innerHTML = '';
      document.getElementById('iconUpload').value = '';
      document.getElementById('screenshotUpload').value = '';

      const fields = ['adminTitle','adminPackage','adminVersion','adminBuild','adminDev','adminContact','adminDesc','adminDownloadLink'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
    }

    window.onload = loadAdminTable;
  </script>
</body>
</html>
