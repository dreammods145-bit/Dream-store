<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel • PlayStore Things</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        * { font-family: 'Roboto', sans-serif; }
        .admin-header { background: linear-gradient(90deg, #1f2937, #111827); }
        .tab-active { border-bottom: 4px solid #00a8e8; color: #00a8e8; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="min-h-screen">
        <header class="admin-header text-white py-5">
            <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <i class="fas fa-crown text-3xl text-amber-400"></i>
                    <div><h1 class="text-2xl font-bold">PlayStore Things</h1><p class="text-xs text-gray-400">Admin Dashboard</p></div>
                </div>
                <button onclick="window.location.href='index.html'" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-5 py-2 rounded-full">
                    <i class="fas fa-store"></i> Back to Store
                </button>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-6 py-8">
            <div class="flex border-b mb-8 bg-white rounded-t-3xl">
                <button onclick="switchAdminTab(0)" id="tab-0" class="tab-active flex-1 py-5 text-center">Manage Apps</button>
                <button onclick="switchAdminTab(1)" id="tab-1" class="flex-1 py-5 text-center">Dashboard</button>
            </div>

            <div id="tab-content-0">
                <div class="flex justify-between mb-6">
                    <h2 class="text-2xl font-semibold">All Apps</h2>
                    <button onclick="showAddModal()" class="bg-[#00a8e8] text-white px-6 py-3 rounded-3xl flex items-center gap-2 hover:bg-[#0099d0]">
                        <i class="fas fa-plus"></i> Add New App
                    </button>
                </div>
                <div id="admin-apps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="tab-content-1" class="hidden">
                <h2 class="text-2xl font-semibold mb-6">Dashboard</h2>
                <div class="bg-white p-8 rounded-3xl text-center">
                    <p class="text-gray-500">Total Apps</p>
                    <p id="dash-apps" class="text-6xl font-bold text-[#00a8e8]">0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit App Modal -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg mx-4 p-8 max-h-[90vh] overflow-auto">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6">Add New App</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">App Logo</label>
                    <input type="file" id="logo-upload" accept="image/*" class="hidden" onchange="previewLogo(this)">
                    <div onclick="document.getElementById('logo-upload').click()" class="border-2 border-dashed border-gray-300 hover:border-[#00a8e8] rounded-3xl p-6 text-center cursor-pointer">
                        <div id="logo-preview"></div>
                        <p class="text-sm text-gray-500 mt-2">Click to upload logo</p>
                    </div>
                </div>

                <input id="app-name" placeholder="App Name *" class="w-full border rounded-2xl px-5 py-4">

                <select id="app-category" class="w-full border rounded-2xl px-5 py-4">
                    <option value="tools">Tools & Things</option>
                    <option value="games">Games</option>
                    <option value="apps">Apps</option>
                    <option value="jerseys">Jerseys</option>
                </select>

                <div>
                    <label class="block text-sm font-medium mb-2">Screenshots</label>
                    <input type="file" id="screenshots-upload" accept="image/*" multiple class="hidden" onchange="previewScreenshots(this)">
                    <div onclick="document.getElementById('screenshots-upload').click()" class="border-2 border-dashed border-gray-300 hover:border-[#00a8e8] rounded-3xl p-6 text-center cursor-pointer">
                        <div id="screenshots-preview" class="flex flex-wrap gap-3 justify-center"></div>
                        <p class="text-sm text-gray-500 mt-2">Click to upload screenshots</p>
                    </div>
                </div>

                <textarea id="app-desc" rows="3" placeholder="Description" class="w-full border rounded-2xl px-5 py-4"></textarea>
                <input id="app-download-url" placeholder="APK Download URL" value="https://playstore.things/apk/" class="w-full border rounded-2xl px-5 py-4">
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="saveApp()" class="flex-1 bg-[#00a8e8] text-white py-4 rounded-3xl font-semibold">Save & Publish to Store</button>
                <button onclick="hideAdminModal()" class="flex-1 border py-4 rounded-3xl font-semibold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Safe localStorage wrapper
        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch (e) {
                if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
                    console.warn("Storage quota exceeded. Clearing old data...");
                    try {
                        localStorage.clear();
                        localStorage.setItem(key, value);
                        return true;
                    } catch (clearError) {
                        alert("Storage is full. Please clear browser data or use smaller images.");
                        return false;
                    }
                }
                return false;
            }
        }

        let appsDB = [];
        try {
            const saved = localStorage.getItem('playstoreApps');
            if (saved) appsDB = JSON.parse(saved);
        } catch (e) {
            appsDB = [];
        }

        let tempLogo = '';
        let tempScreenshots = [];
        let editingAppId = null;   // NEW: Track which app is being edited

        function previewLogo(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    tempLogo = e.target.result;
                    document.getElementById('logo-preview').innerHTML = `<img src="${e.target.result}" class="max-h-32 mx-auto rounded-2xl">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function previewScreenshots(input) {
            const container = document.getElementById('screenshots-preview');
            container.innerHTML = '';
            tempScreenshots = [];
            Array.from(input.files).slice(0, 3).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    tempScreenshots.push(e.target.result);
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = "w-24 h-16 object-cover rounded-xl";
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function showAddModal() {
            editingAppId = null;
            tempLogo = '';
            tempScreenshots = [];
            document.getElementById('logo-preview').innerHTML = '';
            document.getElementById('screenshots-preview').innerHTML = '';
            document.getElementById('modal-title').textContent = "Add New App";
            document.getElementById('app-name').value = '';
            document.getElementById('app-desc').value = '';
            document.getElementById('app-download-url').value = 'https://playstore.things/apk/new-app.apk';
            document.getElementById('admin-modal').classList.remove('hidden');
            document.getElementById('admin-modal').classList.add('flex');
        }

        // NEW: Edit function
        function editApp(id) {
            const app = appsDB.find(a => a.id === id);
            if (!app) return;

            editingAppId = id;
            tempLogo = app.icon;
            tempScreenshots = app.screenshots || [];

            document.getElementById('modal-title').textContent = "Edit App";
            document.getElementById('app-name').value = app.name;
            document.getElementById('app-category').value = app.category;
            document.getElementById('app-desc').value = app.desc || '';
            document.getElementById('app-download-url').value = app.downloadUrl || '';

            // Show logo preview
            document.getElementById('logo-preview').innerHTML = `<img src="${app.icon}" class="max-h-32 mx-auto rounded-2xl">`;

            // Show screenshots preview
            const scContainer = document.getElementById('screenshots-preview');
            scContainer.innerHTML = '';
            (app.screenshots || []).forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = "w-24 h-16 object-cover rounded-xl";
                scContainer.appendChild(img);
            });

            document.getElementById('admin-modal').classList.remove('hidden');
            document.getElementById('admin-modal').classList.add('flex');
        }

        function saveApp() {
            const name = document.getElementById('app-name').value.trim();
            if (!name) {
                alert("Please enter app name");
                return;
            }

            const newApp = {
                id: editingAppId || Date.now(),
                name: name,
                category: document.getElementById('app-category').value,
                icon: tempLogo || "https://picsum.photos/id/1016/200/200",
                screenshots: tempScreenshots.length ? tempScreenshots : ["https://picsum.photos/id/20/800/450"],
                desc: document.getElementById('app-desc').value || "New app added by admin",
                downloadUrl: document.getElementById('app-download-url').value || `https://playstore.things/apk/${name.toLowerCase().replace(/\s+/g,'-')}.apk`,
                reviews: editingAppId ? (appsDB.find(a => a.id === editingAppId)?.reviews || []) : []
            };

            if (editingAppId) {
                // Update existing app
                const index = appsDB.findIndex(a => a.id === editingAppId);
                if (index !== -1) appsDB[index] = newApp;
            } else {
                // Add new app
                appsDB.unshift(newApp);
            }

            const success = safeSetItem('playstoreApps', JSON.stringify(appsDB));

            if (success) {
                hideAdminModal();
                renderAdminApps();
                alert(editingAppId ? `✅ "\( {name}" has been updated!` : `✅ " \){name}" has been successfully published to the store!`);
            } else {
                alert("Could not save due to storage limits. Try smaller images.");
            }
        }

        function renderAdminApps() {
            const container = document.getElementById('admin-apps-grid');
            container.innerHTML = appsDB.map(app => `
                <div class="bg-white rounded-3xl p-6 border border-gray-200">
                    <img src="${app.icon}" class="w-16 h-16 rounded-2xl mx-auto mb-4">
                    <p class="font-semibold text-center">${app.name}</p>
                    <p class="text-xs text-center text-gray-500">${app.category}</p>
                    <div class="flex gap-2 mt-6">
                        <button onclick="editApp(${app.id}); event.stopImmediatePropagation()" 
                                class="flex-1 py-3 bg-blue-50 text-blue-600 rounded-2xl text-sm font-medium">Edit</button>
                        <button onclick="deleteApp(${app.id}); event.stopImmediatePropagation()" 
                                class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl text-sm font-medium">Delete</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('dash-apps').textContent = appsDB.length;
        }

        function deleteApp(id) {
            if (confirm("Delete this app from store?")) {
                appsDB = appsDB.filter(a => a.id !== id);
                safeSetItem('playstoreApps', JSON.stringify(appsDB));
                renderAdminApps();
            }
        }

        function hideAdminModal() {
            const modal = document.getElementById('admin-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            editingAppId = null;
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('[id^="tab-content-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-content-${tab}`).classList.remove('hidden');
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        window.onload = () => {
            renderAdminApps();
            switchAdminTab(0);
            console.log("%c✅ admin.html - Edit option added successfully", "color:#00a8e8; font-weight:bold");
        };
    </script>
</body>
</html>
