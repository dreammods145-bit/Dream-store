<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM STORE  • App Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { font-family: 'Roboto', sans-serif; }
        
        .playstore-header {
            background: linear-gradient(90deg, #00a8e8, #4285f4);
        }
        
        .app-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .app-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        
        .modal {
            animation: modalPop 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- HEADER -->
    <header class="playstore-header text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-3xl font-bold text-[#00a8e8]">▶</div>
                <div class="text-2xl font-bold tracking-tight">DreamStore <span class="text-white/80 text-lg">Things</span></div>
            </div>

            <div class="flex-1 max-w-xl mx-8">
                <div class="relative">
                    <input id="search-input" 
                           type="text" 
                           placeholder="Search apps, games, jerseys..." 
                           class="w-full bg-white text-gray-900 rounded-full py-3 px-6 pl-12 focus:outline-none"
                           onkeyup="if(event.key==='Enter') performSearch()">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="toggleFilterPanel()" class="flex items-center gap-2 bg-white/20 px-5 py-2 rounded-full hover:bg-white/30">
                    <i class="fas fa-filter"></i> Filter
                </button>
                <button onclick="window.location.href=''" 
                        class="flex items-center gap-2 bg-white text-[#00a8e8] px-6 py-2 rounded-full font-semibold hover:bg-gray-100">
                    <i class="fas fa-crown"></i> 
                </button>
                <div class="flex items-center gap-3 cursor-pointer" onclick="fakeProfileClick()">
                    <div class="text-right text-sm">
                        <p class="font-medium">USER</p>
                        <p class="text-xs text-white/70"></p>
                    </div>
                    <div class="w-9 h-9 bg-white rounded-2xl flex items-center justify-center text-[#00a8e8]">👤</div>
                </div>
            </div>
        </div>

        <!-- Secondary Navigation -->
        <div class="max-w-7xl mx-auto px-6 pb-4 flex gap-8 text-sm font-medium overflow-x-auto">
            <a onclick="setCategoryFilter('all')" class="cursor-pointer hover:text-white/80 active-category">For you</a>
            <a onclick="setCategoryFilter('games')" class="cursor-pointer hover:text-white/80">Games</a>
            <a onclick="setCategoryFilter('apps')" class="cursor-pointer hover:text-white/80">Apps</a>
            <a onclick="setCategoryFilter('jerseys')" class="cursor-pointer hover:text-white/80">Jerseys</a>
            <a onclick="setCategoryFilter('tools')" class="cursor-pointer hover:text-white/80">Tools & Things</a>
            <div onclick="switchView('download')" class="ml-auto cursor-pointer flex items-center gap-2 hover:text-white/80">
                <i class="fas fa-download"></i> My Downloads
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">

        <!-- HOME VIEW -->
        <div id="home-view">
            <!-- Featured -->
            <div onclick="installFeatured()" 
                 class="bg-gradient-to-r from-[#00a8e8] to-[#4285f4] text-white rounded-3xl p-8 mb-8 flex gap-8 items-center cursor-pointer hover:scale-[1.01] transition">
                <div class="flex-1">
                    <div class="inline-flex bg-white/20 text-xs px-4 py-1 rounded-full mb-3">NEW</div>
                    <h1 class="text-4xl font-bold leading-none">WELCOME TO</h1>
                    <p class="text-lg mt-3 opacity-90">patches &games apps and jerseys download link </p>
                    <button class="mt-6 bg-white text-[#00a8e8] font-semibold px-8 py-3 rounded-3xl flex items-center gap-3">
                        <i class="fas fa-download"></i> Scroal down 👇
                    </button>
                </div>
                <img src="" class="hidden md:block rounded-3xl shadow-2xl" alt="featured">
            </div>

            <h2 id="results-title" class="text-2xl font-semibold mb-6">Popular Apps & Things</h2>
            
            <div id="apps-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- JS populated -->
            </div>
        </div>

        <!-- DOWNLOADS VIEW -->
        <div id="download-view" class="hidden">
            <div class="flex items-center justify-between mb-8">
                <button onclick="switchView('home')" class="flex items-center gap-2 text-[#00a8e8] font-medium">
                    <i class="fas fa-arrow-left"></i> Back to Store
                </button>
                <h1 class="text-3xl font-semibold">My Downloads</h1>
            </div>
            
            <div id="downloads-list" class="space-y-6"></div>
            
            <div id="no-downloads" class="hidden text-center py-20">
                <i class="fas fa-download text-7xl text-gray-200 mb-6"></i>
                <p class="text-2xl font-medium text-gray-400">No downloads yet</p>
                <p class="text-gray-500 mt-2">Download some apps from the store</p>
            </div>
        </div>
    </div>

    <!-- APP DETAIL MODAL -->
    <div id="app-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-white max-w-2xl w-full mx-4 rounded-3xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 flex items-center gap-5 border-b">
                <div id="modal-icon" class="w-20 h-20 rounded-3xl"></div>
                <div class="flex-1">
                    <h2 id="modal-name" class="text-2xl font-bold"></h2>
                    <p id="modal-developer" class="text-gray-500"></p>
                </div>
                <button onclick="hideModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
            </div>
            
            <div class="flex-1 overflow-auto p-6">
                <div id="modal-screenshots" class="flex gap-4 overflow-x-auto pb-6"></div>
                <p id="modal-desc" class="mt-6 text-gray-700 leading-relaxed"></p>
                
                <div class="mt-10">
                    <h3 class="font-semibold mb-4">User Reviews</h3>
                    <div id="reviews-list" class="space-y-6"></div>
                </div>
            </div>
            
            <div class="p-6 border-t flex gap-4">
                <button onclick="startDownloadFromModal()" 
                        class="flex-1 bg-[#00a8e8] text-white py-5 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3">
                    <i class="fas fa-download"></i> Download & Install
                </button>
                <button onclick="copyRealDownloadLink()" 
                        class="flex items-center justify-center gap-2 border border-gray-300 hover:bg-gray-50 px-8 rounded-3xl font-medium">
                    <i class="fas fa-link"></i> Get APK Link
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-4 rounded-3xl shadow-2xl z-[200]">
        <span id="toast-text"></span>
    </div>

    <script>
        let appsDB = JSON.parse(localStorage.getItem('playstoreApps')) || [
            {
                id: 1,
                name: "Smart Lamp Controller",
                category: "tools",
                icon: "https://picsum.photos/id/1016/200/200",
                screenshots: ["https://picsum.photos/id/20/800/450", "https://picsum.photos/id/201/800/450"],
                desc: "Control your smart lights with AI automation and scheduling.",
                rating: 4.9,
                downloadUrl: "https://playstore.things/apk/smart-lamp-controller-v2.4.apk",
                size: "32 MB",
                reviews: [
                    {user: "Rahul S.", rating: 5, text: "Best smart home app ever!"},
                    {user: "Priya M.", rating: 4, text: "Great UI but occasional lag."}
                ]
            },
            {
                id: 2,
                name: "Epic Things Runner",
                category: "games",
                icon: "https://picsum.photos/id/201/200/200",
                screenshots: ["https://picsum.photos/id/251/800/450"],
                desc: "Exciting endless runner through smart home gadgets.",
                rating: 4.5,
                downloadUrl: "https://playstore.things/apk/epic-things-runner-v1.8.apk",
                size: "145 MB",
                reviews: [{user: "Amit K.", rating: 5, text: "Super addictive!"}]
            },
            {
                id: 3,
                name: "Jersey Designer Pro",
                category: "jerseys",
                icon: "https://picsum.photos/id/237/200/200",
                screenshots: ["https://picsum.photos/id/1005/800/450"],
                desc: "Design and preview custom jerseys with AR support.",
                rating: 4.9,
                downloadUrl: "https://playstore.things/apk/jersey-designer-pro-v3.1.apk",
                size: "68 MB",
                reviews: [{user: "Sneha P.", rating: 5, text: "Amazing AR preview!"}]
            },
            {
                id: 4,
                name: "Utility Master",
                category: "apps",
                icon: "https://picsum.photos/id/160/200/200",
                screenshots: ["https://picsum.photos/id/160/800/450"],
                desc: "All-in-one utility toolkit for your phone.",
                rating: 4.6,
                downloadUrl: "https://playstore.things/apk/utility-master-v2.0.apk",
                size: "55 MB",
                reviews: []
            }
        ];

        let downloadedApps = [];
        let currentView = 'home';

        function renderApps(filteredApps) {
            const grid = document.getElementById('apps-grid');
            grid.innerHTML = filteredApps.map(app => `
                <div onclick="showAppDetail(${app.id})" class="app-card bg-white rounded-3xl overflow-hidden border border-gray-100 cursor-pointer">
                    <div class="p-4 flex gap-4">
                        <img src="${app.icon}" class="w-16 h-16 rounded-2xl">
                        <div class="flex-1">
                            <p class="font-semibold text-lg leading-tight">${app.name}</p>
                            <p class="text-xs text-gray-500 mt-1">★ ${app.rating}</p>
                        </div>
                    </div>
                    <div class="px-4 pb-4">
                        <button onclick="event.stopImmediatePropagation(); quickDownload(${app.id});" 
                                class="w-full py-3 bg-[#00a8e8] text-white rounded-3xl font-medium">Get</button>
                    </div>
                </div>
            `).join('');
        }

        function showAppDetail(id) {
            const app = appsDB.find(a => a.id === id);
            if (!app) return;

            document.getElementById('modal-icon').innerHTML = `<img src="${app.icon}" class="w-20 h-20 rounded-3xl">`;
            document.getElementById('modal-name').textContent = app.name;
            document.getElementById('modal-developer').innerHTML = `★ ${app.rating} • ${app.size || 'Free'}`;
            document.getElementById('modal-desc').textContent = app.desc;

            const sc = document.getElementById('modal-screenshots');
            sc.innerHTML = (app.screenshots || []).map(url => 
                `<img src="${url}" class="w-72 h-40 object-cover rounded-2xl flex-shrink-0">`
            ).join('');

            const reviewsDiv = document.getElementById('reviews-list');
            reviewsDiv.innerHTML = (app.reviews || []).map(review => `
                <div class="bg-gray-50 p-5 rounded-3xl">
                    <div class="flex items-center justify-between">
                        <span class="font-medium">${review.user}</span>
                        <span class="text-amber-400">★ ${review.rating}</span>
                    </div>
                    <p class="text-sm mt-3 text-gray-700">${review.text}</p>
                </div>
            `).join('') || '<p class="text-gray-400 text-center py-8">No reviews yet</p>';

            window.currentApp = app;
            document.getElementById('app-modal').classList.remove('hidden');
            document.getElementById('app-modal').classList.add('flex');
        }

        function hideModal() {
            const modal = document.getElementById('app-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function quickDownload(id) {
            const app = appsDB.find(a => a.id === id);
            if (app) startFakeDownload(app);
            event.stopImmediatePropagation();
        }

        function startDownloadFromModal() {
            if (window.currentApp) {
                hideModal();
                startFakeDownload(window.currentApp);
            }
        }

        function copyRealDownloadLink() {
            if (window.currentApp) {
                navigator.clipboard.writeText(window.currentApp.downloadUrl);
                showToast("✅ APK link copied!");
                hideModal();
            }
        }

        function startFakeDownload(app) {
            if (!downloadedApps.find(d => d.id === app.id)) {
                downloadedApps.unshift(app);
            }
            showToast(`Downloading ${app.name}...`);
            setTimeout(() => switchView('download'), 800);
        }

        function renderDownloads() {
            const container = document.getElementById('downloads-list');
            const noDiv = document.getElementById('no-downloads');
            
            if (downloadedApps.length === 0) {
                noDiv.classList.remove('hidden');
                container.innerHTML = '';
                return;
            }
            
            noDiv.classList.add('hidden');
            container.innerHTML = downloadedApps.map(app => `
                <div class="bg-white rounded-3xl p-6 flex gap-6 items-center border border-gray-100">
                    <img src="${app.icon}" class="w-16 h-16 rounded-2xl">
                    <div class="flex-1">
                        <p class="font-semibold text-lg">${app.name}</p>
                        <p class="text-emerald-600 text-sm">${app.size} • Installed</p>
                    </div>
                    <a href="${app.downloadUrl}" target="_blank" 
                       class="bg-[#00a8e8] text-white px-6 py-3 rounded-3xl text-sm font-medium">Download APK</a>
                </div>
            `).join('');
        }

        function performSearch() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = term ? appsDB.filter(app => app.name.toLowerCase().includes(term)) : appsDB;
            renderApps(filtered);
        }

        function setCategoryFilter(cat) {
            const filtered = cat === 'all' ? appsDB : appsDB.filter(app => app.category === cat);
            renderApps(filtered);
        }

        function switchView(view) {
            document.getElementById('home-view').classList.toggle('hidden', view !== 'home');
            document.getElementById('download-view').classList.toggle('hidden', view !== 'download');
            if (view === 'download') renderDownloads();
        }

        function installFeatured() {
            startFakeDownload(appsDB[2]);
        }

        function fakeProfileClick() {
            showToast("Welcome back, True!");
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = text;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        function toggleFilterPanel() {
            showToast("Filter panel coming soon");
        }

        // Initialize Desktop Version
        window.onload = () => {
            renderApps(appsDB);
            console.log("%c✅ PlayStore Things - Desktop Mode Loaded", "color:#00a8e8; font-weight:700");
        };
    </script>
</body>
</html>
